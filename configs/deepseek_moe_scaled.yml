# configs/deepseek_moe_scaled.yml
# Scaled-down DeepSeek MoE model under 1.0B parameters (~173M parameters, ~50M active params per token)

base_emb_dim: 512
base_num_query_heads: 8
base_num_kv_heads: 8
base_mlp_dim: 1024
base_moe_mlp_dim: 512
base_num_decoder_layers: 6
first_num_dense_layers: 1
mlp_activations: ["silu", "linear"]
vocab_size: 129280
enable_dropout: false
logits_via_embedding: false
normalization_layer_epsilon: 1.0e-6

# MoE Configurations
num_experts: 8
num_experts_per_tok: 2
shared_experts: 1
routed_scaling_factor: 2.5
routed_score_func: "sigmoid"
routed_bias: true
decoder_block: "deepseek"

# MLA (Multi-head Latent Attention)
attention_type: "mla"
q_lora_rank: 128
kv_lora_rank: 64
qk_nope_head_dim: 32
qk_rope_head_dim: 16
v_head_dim: 64

# RoPE
mscale: 1.0
rope_type: "yarn"
rope_max_timescale: 10000
max_position_embeddings: 4096
original_max_position_embeddings: 4096
rope_factor: 1
beta_fast: 32
rope_interleave: true
rope_truncate: true
rope_attention_scaling: false

# Disabled indexer and engram for single-device Colab stability
use_indexer: false
engram_layers: []
